    <path d="M190 60c-12 8-22 20-26 34-4 12-2 24 4 34l-18-16c-8-16-4-32 8-48 10-12 20-20 32-24z" />
    <path d="M178 258c-8 18-4 36 8 50l-20 8c-12-18-12-38-2-58 8-16 22-30 38-38l10 8c-14 6-26 14-34 30z" />
