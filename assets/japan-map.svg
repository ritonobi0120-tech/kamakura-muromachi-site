<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640" role="img" aria-labelledby="title desc">
  <title id="title">日本地図</title>
  <desc id="desc">北海道から沖縄までの島々を描いたシンプルな日本列島図</desc>
  <defs>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7f3ff" />
      <stop offset="1" stop-color="#c2d9ff" />
    </linearGradient>
    <linearGradient id="land" x1="0.25" y1="0" x2="0.75" y2="1">
      <stop offset="0" stop-color="#4f9ed8" />
      <stop offset="0.5" stop-color="#3f86c2" />
      <stop offset="1" stop-color="#2f6fae" />
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.85)" />
      <stop offset="0.6" stop-color="rgba(255,255,255,0.4)" />
      <stop offset="1" stop-color="rgba(255,255,255,0)" />
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#1b3b62" flood-opacity="0.28" />
    </filter>
  </defs>
  <rect width="360" height="640" fill="url(#sea)" />
