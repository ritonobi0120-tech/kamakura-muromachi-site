<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>段階式ナンプレ 50 ステージ</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app-shell">
      <main class="app-layout">
        <section class="board-section" aria-label="ナンプレ盤面">
          <div id="sudokuBoard" class="sudoku-board" role="grid" aria-label="ナンプレ盤面"></div>
          <div class="number-pad" aria-label="数字パッド">
            <button data-value="1">1</button>
            <button data-value="2">2</button>
            <button data-value="3">3</button>
            <button data-value="4">4</button>
            <button data-value="5">5</button>
            <button data-value="6">6</button>
            <button data-value="7">7</button>
            <button data-value="8">8</button>
            <button data-value="9">9</button>
            <button data-value="0" class="secondary">消去</button>
          </div>
          <div class="board-actions">
            <button id="checkSolution" class="primary" type="button">これでいく！</button>
          </div>
        </section>
        <aside class="info-panel" aria-label="補助と情報">
          <section class="panel-card stage-overview">
            <div class="stage-overview__header">
              <p class="stage-badge" id="currentStageBadge">ステージ01｜北海道</p>
              <div class="stage-overview__actions">
                <button id="openStageModal" class="primary" type="button">マップを開く</button>
                <button id="resetStage" class="secondary" type="button">盤面をリセット</button>
              </div>
            </div>
            <ul class="stage-meta">
              <li class="stage-meta__item">
                <img src="assets/icon-map-pin.svg" alt="" class="stage-meta__icon" />
                <div class="stage-meta__body">
                  <p class="stage-meta__label">冒険先</p>
                  <p class="stage-meta__value">
                    <strong id="stageName">北海道</strong>
                    <span class="stage-meta__sub">ステージ <span id="stageNumber">01</span></span>
                  </p>
                </div>
              </li>
              <li class="stage-meta__item">
                <img src="assets/icon-star.svg" alt="" class="stage-meta__icon" />
                <div class="stage-meta__body">
                  <p class="stage-meta__label">難易度</p>
                  <p class="stage-meta__value">
                    <strong id="stageDifficulty">初級</strong>
                  </p>
                </div>
              </li>
              <li class="stage-meta__item stage-meta__item--time">
                <img src="assets/icon-clock.svg" alt="" class="stage-meta__icon" />
                <div class="stage-meta__body stage-time">
                  <p>
                    <span>タイム</span>
                    <strong id="currentTime">00:00</strong>
                  </p>
                  <p>
                    <span>ベスト</span>
                    <strong id="bestTime">--</strong>
                  </p>
                </div>
              </li>
            </ul>
            <div class="progress">
              <div class="progress-bar"><span id="progressFill"></span></div>
              <p id="progressLabel">0 / 50 ステージクリア</p>
            </div>
            <div class="stage-overview__footer">
              <button id="resetProgress" class="ghost" type="button">進行状況をリセット</button>
            </div>
          </section>

          <section class="panel-card panel-card--controls">
            <h2>プレイ支援</h2>
            <div class="play-controls">
              <label class="control-toggle" for="notesToggle">
                <input type="checkbox" id="notesToggle" />
                <span class="control-toggle__track" aria-hidden="true">
                  <span class="control-toggle__thumb"></span>
                </span>
                <span class="control-toggle__content">
                  <span class="control-toggle__title">メモモード</span>
                  <span class="control-toggle__caption">1マスに候補を複数キープ</span>
                </span>
              </label>
              <button id="hintButton" class="control-hint" type="button">
                <span class="hint-button__label">ヒントを使う</span>
                <span class="hint-button__count" id="hintCount">残り 3 回</span>
              </button>
              <p class="status-message" id="statusMessage" aria-live="polite"></p>
            </div>
          </section>
        </aside>
      </main>
    </div>

    <div
      class="stage-modal"
      id="stageModal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="stageModalTitle"
      aria-hidden="true"
      hidden
    >
      <div class="stage-modal__content" tabindex="-1">
        <button type="button" id="closeStageModal" class="stage-modal__close" aria-label="閉じる">
          ×
        </button>
        <h2 id="stageModalTitle">冒険マップ</h2>
        <p id="stageModalSubtitle" class="stage-modal__subtitle">
          クリア済みのルートから次の挑戦先を選びましょう。盤面は自動保存されます。
        </p>
        <div class="stage-modal__body">
          <div class="stage-map" aria-label="ステージマップ">
            <div class="japan-map-header">
              <h3>日本列島</h3>
              <p>隣接する都道府県を進んで全国制覇を目指そう。</p>
            </div>
            <div class="japan-map-canvas">
              <img
                src="assets/japan-block-map.svg"
                alt="日本列島の冒険マップ"
                class="japan-map-image"
                loading="lazy"
              />
              <div
                class="japan-map-overlay"
                id="japanMap"
                aria-label="日本の都道府県マップ"
              ></div>
            </div>
            <p id="worldUnlockMessage" class="world-unlock-message">
              日本全県を制覇すると海外航路が開き、主要な国と月・太陽への挑戦が待っています。
            </p>
            <div
              class="world-stage-list"
              id="worldStageList"
              role="list"
              aria-label="海外と宇宙のステージ"
            ></div>
          </div>
          <div class="stage-modal__actions">
            <label for="stageSelect" class="stage-modal__label">リストから選ぶ</label>
            <select id="stageSelect" aria-label="ステージ選択"></select>
            <p class="stage-modal__hint">
              マップ上のステージを選ぶか、リストから直接ジャンプできます。
            </p>
          </div>
        </div>
      </div>
    </div>

    <div
      class="celebration-overlay"
      id="celebrationOverlay"
      role="dialog"
      aria-modal="true"
      aria-labelledby="celebrationTitle"
      aria-describedby="celebrationMessage"
      aria-hidden="true"
      hidden
    >
      <div
        class="celebration-overlay__backdrop"
        id="celebrationOverlayBackdrop"
        aria-hidden="true"
      ></div>
      <div class="celebration-overlay__content" id="celebrationContent" tabindex="-1">
        <div class="celebration-overlay__fireworks" aria-hidden="true">
          <span class="celebration-firework celebration-firework--1"></span>
          <span class="celebration-firework celebration-firework--2"></span>
          <span class="celebration-firework celebration-firework--3"></span>
          <span class="celebration-firework celebration-firework--4"></span>
          <span class="celebration-firework celebration-firework--5"></span>
          <span class="celebration-firework celebration-firework--6"></span>
        </div>
        <p class="celebration-overlay__stage" id="celebrationStage"></p>
        <h2 class="celebration-overlay__title" id="celebrationTitle">クリアおめでとう！</h2>
        <p class="celebration-overlay__message" id="celebrationMessage"></p>
        <div class="celebration-overlay__stats">
          <div class="celebration-overlay__stat">
            <span class="celebration-overlay__label">クリアタイム</span>
            <span class="celebration-overlay__value" id="celebrationTime">--:--</span>
          </div>
          <div class="celebration-overlay__stat">
            <span class="celebration-overlay__label">ベスト</span>
            <span class="celebration-overlay__value" id="celebrationBest">--:--</span>
          </div>
        </div>
        <div class="celebration-overlay__actions">
          <button type="button" id="celebrationMapButton" class="primary">進路を選ぶ</button>
          <button type="button" id="celebrationCloseButton" class="secondary">あとで見る</button>
        </div>
      </div>
    </div>

    <template id="cellTemplate">
      <button class="cell" role="gridcell" aria-live="polite">
        <span class="value"></span>
        <div class="notes"></div>
      </button>
    </template>

    <script src="script.js" type="module"></script>
  </body>
</html>
